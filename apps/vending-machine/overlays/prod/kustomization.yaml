# apps/vending-machine/overlays/prod/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: vending-prod

namePrefix: prod-

# Prod needs more replicas for high availability
patches:
- target:
    kind: Deployment
    name: vending-machine
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 3