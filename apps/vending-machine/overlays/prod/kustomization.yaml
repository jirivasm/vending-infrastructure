# apps/vending-machine/overlays/prod/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: vending-prod

namePrefix: prod-

# Prod needs more replicas for high availability
patches:
# 1. Patch the Deployment for 1 replica (Save resources in the lab)
- target:
    kind: Deployment
    name: vending-machine
  patch: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: vending-machine
    spec:
      replicas: 3
      template:
        spec:
          containers:
          - name: vending-app 
            env:
            - name: DB_NAME
              value: "vending-machine"
            - name: DB_HOST
              value: "postgres-db-prod-postgresql"
            - name: DB_USER
              value: "postgres"

# 2. Patch the Ingress for your Dev Cloudflare URL
- target:
    kind: Ingress
    name: vending-ingress
  patch: |
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: vending-ingress
    spec:
      rules:
      - host: vending.jirivasm.dev