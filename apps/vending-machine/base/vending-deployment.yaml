# vending-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vending-machine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vending-machine
  template:
    metadata:
      labels:
        app: vending-machine
    spec:
      containers:
      - name: vending-app
        image: jirivasm/vending-app:latest
        env:
        - name: DB_HOST
          # The internal DNS name we found earlier
          value: "postgresql.database.svc.cluster.local"
        - name: DB_USER
          value: "postgres"
        - name: DB_NAME
          value: "postgres"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              # Point to the SAME secret pgAdmin is using
              name: postgres-auth-secret
              key: postgres-password
        - name: APP_STACK
          value: "Python | Flask | Jenkins | Kubernetes | ArgoCD | Longhorn | Cloudflare"
        ports:
        - containerPort: 5001