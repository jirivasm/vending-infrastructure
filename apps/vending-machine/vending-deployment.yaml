# vending-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vending-machine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vending-machine
  template:
    metadata:
      labels:
        app: vending-machine
    spec:
      containers:
      - name: vending-app
        image: jirivasm/vending-app:latest
        env:
        - name: APP_STACK
          value: "Python | Flask | Jenkins | Kubernetes | ArgoCD | Cloudflare"
        ports:
        - containerPort: 5001