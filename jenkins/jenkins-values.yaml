controller:
  overwritePlugins: true
  installPlugins:
    - kubernetes
    - workflow-aggregator
    - git
    - docker-workflow
    - docker-commons
    - pipeline-stage-view
  persistence:
    enabled: true
    storageClass: "standard"  # Using our verified storage
    size: "10Gi"
  serviceType: ClusterIP # We'll use Cloudflare or Port-forwarding for access