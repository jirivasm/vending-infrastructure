apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jenkins
  namespace: {{ .Values.namespace | default "jenkins" }}
  labels:
    app.kubernetes.io/component: "jenkins-controller"
    app.kubernetes.io/instance: "jenkins"
spec:
  serviceName: jenkins
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
      app.kubernetes.io/component: "jenkins-controller"
      app.kubernetes.io/instance: "jenkins"
  template:
    metadata:
      labels:
        app: jenkins
        app.kubernetes.io/component: "jenkins-controller"
        app.kubernetes.io/instance: "jenkins"
    spec:
      # This line moves it to the Pi
      nodeSelector:
        kubernetes.io/arch: {{ index .Values.controller.nodeSelector "kubernetes.io/arch" }}
      containers:
      - name: jenkins
        # These lines pull the official image from your values
        image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
        imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 50000
          name: agent-listener
        env:
        - name: JAVA_OPTS
          value: {{ .Values.controller.javaOpts | quote }}
        - name: JENKINS_OPTS
          value: {{ .Values.controller.jenkinsOpts | quote }}
        resources:
          requests:
            cpu: {{ .Values.controller.resources.requests.cpu }}
            memory: {{ .Values.controller.resources.requests.memory }}
          limits:
            cpu: {{ .Values.controller.resources.limits.cpu }}
            memory: {{ .Values.controller.resources.limits.memory }}
        volumeMounts:
        - name: jenkins-data
          mountPath: /var/jenkins_home
      volumes:
      - name: jenkins-data
        persistentVolumeClaim:
          claimName: {{ .Values.controller.persistence.existingClaim }}