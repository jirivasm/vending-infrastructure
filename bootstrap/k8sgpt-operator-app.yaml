apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8sgpt-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://charts.k8sgpt.ai/'
    chart: k8sgpt-operator
    targetRevision: '*'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: k8sgpt-operator-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8sgpt-user-config
  namespace: argocd
spec:
  project: default
  source:
    # This points to your personal repo (jirivasm)
    repoURL: 'git@github.com:jirivasm/vending-infrastructure.git'
    targetRevision: main
    path: values  # <--- Path where you saved the k8sgpt-config.yaml
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: k8sgpt-operator-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true