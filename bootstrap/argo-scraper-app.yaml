apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scraper-app
  namespace: argocd # Stays in your management namespace
spec:
  project: default
  source:
    repoURL: git@github.com:jirivasm/WorkSearch.git
    targetRevision: HEAD
    path: Infra
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: scraper # Where the CronJob will be deployed
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true