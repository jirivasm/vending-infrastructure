apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-secrets
  namespace: argocd
spec:
  project: default
  sources:
    repoURL: git@github.com:jirivasm/vending-infrastructure.git
    targetRevision: HEAD
    path: secrets # <--- This tells Argo to look in your secrets folder
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true