apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vending-app
  namespace: devops-tools
  # The "Secret Sauce" annotations go here!
  annotations:
    argocd-image-updater.argoproj.io/image-list: vending=jirivasm/vending-app:latest
    argocd-image-updater.argoproj.io/vending.update-strategy: digest
    argocd-image-updater.argoproj.io/write-back-method: argocd
  labels:
    argocd-image-updater.argoproj.io/enabled: "true"
spec:
  project: default
  source:
    repoURL: git@github.com:jirivasm/vending-infrastructure.git
    targetRevision: HEAD
    path: apps/vending-machine/overlays/dev # This points to your actual deployment code
  destination:
    server: https://kubernetes.default.svc
    namespace: vending-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  