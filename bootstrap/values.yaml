# Use Longhorn for persistent data
repoServer:
  persistence:
    enabled: true
    storageClass: "standard"
    accessMode: ReadWriteOnce
    size: 5Gi  # You must define a size for the claim to be generated
  volumes:
    - name: argocd-repo-server-data
      persistentVolumeClaim:
        claimName: argocd-repo-server-pvc
  volumeMounts:
    - name: argocd-repo-server-data
      mountPath: /app/config/repository

redis:
  enabled: true
  persistence:
    enabled: true
    storageClass: "standard"
    size: 2Gi

server:
  extraArgs:
    - --insecure # Allows Cloudflare/Ingress to handle SSL
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - argo.jirivasm.dev
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"

# Keep it light for your lab resources
global:
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi