piVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-db
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: postgresql
    targetRevision: 15.5.x
    helm:
      valueFiles:
        - git@github.com:jirivasm/vending-infrastructure.git/postgress/postgres-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: vending-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pgadmin
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://runix.github.io/charts
    chart: pgadmin4
    targetRevision: 1.35.x
    helm:
      valueFiles:
        - git@github.com:jirivasm/vending-infrastructure.git/postgress/pgadmin-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: vending-dev