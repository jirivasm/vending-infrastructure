apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-secrets
  namespace: argocd
spec:
  project: default
  # 1. MUST be 'source' (singular) because we are only looking at one Git folder
  source: 
    repoURL: git@github.com:jirivasm/vending-infrastructure.git
    targetRevision: HEAD
    path: secrets 
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pgadmin
  namespace: argocd
spec:
  project: default
  # 2. 'sources' (plural AND a list with dashes) to combine Runix Helm + Git values
  sources:
    - repoURL: https://runix.github.io/charts
      chart: pgadmin4
      targetRevision: 1.35.x
      helm:
        valueFiles:
          - $my-git-repo/values/pgadmin-values.yaml # Adjust this path if you kept it in the 'postgress/' folder!
    - repoURL: git@github.com:jirivasm/vending-infrastructure.git
      targetRevision: HEAD
      ref: my-git-repo
      path: '.'
  destination:
    server: https://kubernetes.default.svc
    namespace: vending-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-db
  namespace: argocd
spec:
  project: default
  sources:
    # 1. The code for the database (Bitnami)
    - repoURL: https://charts.bitnami.com/bitnami
      chart: postgresql
      targetRevision: 15.5.38
      helm:
        valueFiles:
          - $my-infra-repo/values/postgres-values.yaml # <--- This fixes the Docker error!
    # 2. Your configuration (Git)
    - repoURL: git@github.com:jirivasm/vending-infrastructure.git
      targetRevision: HEAD
      ref: my-infra-repo
  destination:
    server: https://kubernetes.default.svc
    namespace: vending-dev # Keep it in the same namespace as your app!
  syncPolicy:
    automated:
      prune: true
      selfHeal: true