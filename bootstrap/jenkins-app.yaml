apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins
  namespace: argocd # Stays in your management namespace
spec:
  project: default
  sources:
    repoURL: git@github.com:jirivasm/vending-infrastructure.git
    targetRevision: HEAD
    helm:
      valueFiles:
       - /values/jenkins-values.yaml
    path: jenkins # Or wherever your Jenkins manifests live
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins # Deploys into the same toolset namespace
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true