apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins
  namespace: argocd
spec:
  project: default
  sources:
    # Source 1: The official Jenkins logic
    - repoURL: 'https://charts.jenkins.io'
      chart: jenkins
      targetRevision: 5.7.13 # A more modern version of the chart
      helm:
        valueFiles:
          - $my-git-repo/values/jenkins-values.yaml
    # Source 2: Your personal configuration
    - repoURL: git@github.com:jirivasm/vending-infrastructure.git
      targetRevision: HEAD
      ref: my-git-repo # This creates the variable $my-git-repo
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  # This block must move OUTSIDE of the sources list to apply to both
  