prometheus:
  prometheusSpec:
    # Reduce retention so you don't fill your disk immediately
    retention: 10d
    retentionSize: 10GB
    
    resources:
      requests:
        memory: 400Mi  # Note: Use 'Mi', not 'mi'
        cpu: 100m
      limits:
        memory: 1Gi
        
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

# 2. Configure Grafana Storage
grafana:
  persistence:
    enabled: true
    storageClassName: longhorn
    accessModes: ["ReadWriteOnce"]
    size: 10Gi

# 3. Disable Alertmanager storage (Optional, keeps it simple)
alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi