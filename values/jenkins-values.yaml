controller:
  # Moves the controller to the Raspberry Pi
  nodeSelector:
    kubernetes.io/arch: "arm64"

  resources:
    requests:
      cpu: "300m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "1.5Gi"

  image:
    # Use the official multi-arch Jenkins image
    repository: "jenkins/jenkins"
    tag: "2.479.3-jdk17" # <--- FIXED: Bumped from "lts" to prevent plugin crash
    pullPolicy: Always
  overwritePlugins: true
  installPlugins:
    - kubernetes
    - workflow-aggregator
    - git
    - github
    - docker-workflow
    - docker-commons
    - pipeline-stage-view
  # CRITICAL: Keep your Java limits to protect the Pi's RAM
  javaOpts: "-Xmx1024m -Xms512m -Djava.awt.headless=true -Dhudson.security.csrf.DefaultCrumbIssuer.EXCLUDE_SESSION_ID=true"
  jenkinsOpts: "--prefix=/" 
  persistence:
    enabled: true
    existingClaim: "jenkins-0" # Longhorn will move this to the Pi
  serviceType: ClusterIP

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web
      # Optional: Force HTTPS if you have certs set up
      # traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd
    hostName: jenkins.yourdomain.com
    paths:
      - path: /
        pathType: Prefix

agent:
  enabled: true
  # Use the official agent image (Kaniko handles the builds)
  image: # <--- FIXED: Turned into a dictionary
    repository: "jenkins/inbound-agent" 
    tag: "latest"
    pullPolicy: Always
  # Force the build workers to the Pi
  nodeSelector:
    kubernetes.io/arch: "arm64"
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"