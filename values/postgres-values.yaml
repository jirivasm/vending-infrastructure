global:
  postgresql:
    auth:
      # Use the secret generated by your ExternalSecret bridge
      existingSecret: "postgres-auth-secret"
      database: "vending_machine"
      secretKeys:
        userPasswordKey: "postgres-password"

primary:
  image:
    registry: public.ecr.aws
    repository: bitnami/postgresql
    tag: 16.4.0-debian-12-r14
  persistence:
    enabled: true
    storageClass: "longhorn"
    size: 8Gi
    annotations: 
      longhorn.io/data-locality: "best-effort"
  resourcesPreset: "small"