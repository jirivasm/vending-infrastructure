# 1. Global Auth Settings
global:
  postgresql:
    auth:
      existingSecret: "postgres-auth-secret"
      database: "vending_machine"
      secretKeys:
        userPasswordKey: "postgres-password"

# 2. THE FIX: Image must be at the ROOT level, completely outside of 'primary'
image:
  registry: public.ecr.aws
  repository: bitnami/postgresql
  tag: "18"

# 3. Primary Node Settings (Storage and Resources)
primary:
  nodeSelector:
    kubernetes.io/arch: amd64
  persistence:
    enabled: true
    storageClass: "longhorn"
    size: 8Gi
    annotations: 
      longhorn.io/data-locality: "best-effort"
  resourcesPreset: "small"