# 1. Credentials
env:
  email: "jirivasmo@gmail.com"

# 2. Secret Configuration (Move these OUT of the 'env' block)
existingSecret: "pgadmin-web-auth"
secretKeys:
  pgadminPasswordKey: "admin-password" 

# 3. Storage for your Chicago Home Lab
persistence:
  enabled: true
  storageClass: "longhorn"
  accessMode: ReadWriteOnce
  size: 1Gi

# 4. Access (Modern Ingress)
ingress:
  enabled: true
  # Using ingressClassName instead of the deprecated annotation
  ingressClassName: "traefik" 
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: pgadmin.jirivasm.dev
      paths:
        - path: /
          pathType: Prefix