repoServer:
  persistence:
    enabled: true
    storageClass: "longhorn"  # Updated to use Longhorn
    accessMode: ReadWriteOnce
    size: 5Gi 
  resources:
    limits:
      cpu: "1000m"      # Allow it to use a full core during manifest generation
      memory: "1.5Gi"     # Bump this to 1Gi to handle Helm/Git tasks
    requests:
      cpu: "500m"
      memory: "512Mi"
redis:
  enabled: true
  persistence:
    enabled: true
    storageClass: "longhorn"  # Updated to use Longhorn
    size: 2Gi

server:
  extraArgs:
    - --insecure # Allows Traefik/Cloudflare to handle SSL
  ingress:
    enabled: true
    ingressClassName: traefik  # Switched from Nginx to Traefik
    hosts:
      - argo.jirivasm.dev
    annotations:
      # Traefik specific annotations
      traefik.ingress.kubernetes.io/router.entrypoints: web
      traefik.ingress.kubernetes.io/router.middlewares: "traefik-forwarded-proto@kubernetescrd"
      # If using SSL via Traefik/Cloudflare, you might use:
      # traefik.ingress.kubernetes.io/router.tls: "true"

# Resource limits tailored for your mini PC cluster
global:
  resources:
    limits:
      cpu: 1000m
      memory: 1G1
    requests:
      cpu: 250m
      memory: 512Mi