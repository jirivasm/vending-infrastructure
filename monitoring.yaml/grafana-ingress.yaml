apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    # If using cert-manager (optional if Cloudflare handles SSL)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod" 
    
    # Standard Ingress class
    kubernetes.io/ingress.class: "traefik" # Or "nginx" depending on your K3s setup
spec:
  rules:
  - host: grafana.jirivasm.dev  # CHANGE THIS to your desired domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: monitoring-grafana # This is the default service name from the Helm chart
            port:
              number: 80